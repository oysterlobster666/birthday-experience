<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>重建周遭｜分享海报</title>
    <link rel="stylesheet" href="./share-poster.css" />
  </head>
  <body>
    <main class="poster">
      <div class="rings rings-top" aria-hidden="true"></div>
      <div class="rings rings-bottom" aria-hidden="true"></div>

      <header class="poster-header">
        <p>AN EXPERIENCE PORTRAIT</p>
        <span>12 个片刻 · 约 3 分钟</span>
      </header>

      <section class="poster-title">
        <div class="window-mark" aria-hidden="true">
          <svg viewBox="0 0 160 160">
            <circle cx="80" cy="80" r="66"/>
            <path d="M42 124V63c0-25 17-43 38-43s38 18 38 43v61M80 22v102M42 73h76"/>
            <path d="M80 124c-10-22-5-40 13-55M80 124c13-18 26-23 40-21M80 124c-18-18-32-22-43-15"/>
            <circle cx="94" cy="67" r="4"/><circle cx="120" cy="103" r="4"/><circle cx="37" cy="109" r="4"/>
          </svg>
        </div>
        <p class="kicker">REBUILD YOUR WORLD</p>
        <h1>重新认识自己，<br />也重新建造世界。</h1>
        <p class="intro">用十二个关于你的片刻，发现下一段值得靠近的新体验。</p>
      </section>

      <section class="journey" aria-label="测试流程">
        <article>
          <span>01</span>
          <svg viewBox="0 0 100 100"><path d="M50 12v74M50 40C30 25 17 32 18 53c17 4 27-1 32-13Zm0 20c20-15 33-8 32 13-17 4-27-1-32-13Z"/></svg>
          <strong>凭直觉作答</strong>
        </article>
        <i aria-hidden="true">→</i>
        <article>
          <span>02</span>
          <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="32"/><path d="M50 18v64M18 50h64M27 27l46 46M73 27 27 73"/></svg>
          <strong>看见体验人格</strong>
        </article>
        <i aria-hidden="true">→</i>
        <article>
          <span>03</span>
          <svg viewBox="0 0 100 100"><path d="M17 78c8-31 45-23 58-49 5-10 3-18-2-24M24 74c19-8 36-7 53 1"/><circle cx="75" cy="10" r="5"/></svg>
          <strong>收获体验方向</strong>
        </article>
      </section>

      <section class="scan">
        <div class="qr-frame">
          <img src="./assets/share/birthday-experience-qr.png" alt="进入体验测试的二维码" />
        </div>
        <div class="scan-copy">
          <p>SCAN TO BEGIN</p>
          <h2>微信扫码<br />开始探索</h2>
          <span>凭直觉回答，没有标准答案</span>
        </div>
      </section>

      <footer>
        <p>一场关于「重建周遭」的体验探索</p>
        <span>愿你在新的体验里，更靠近理想中的自己。</span>
      </footer>
    </main>
  </body>
</html>
